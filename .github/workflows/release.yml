name: Release Binaries

on:
  push:
    branches:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: npm ci

      - name: Build binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          OS="$(echo '${{ runner.os }}' | tr '[:upper:]' '[:lower:]')"
          ARCH="$(echo '${{ runner.arch }}' | tr '[:upper:]' '[:lower:]')"
          bun build --compile source/cli.tsx --outfile "dist/minenet-cli-${OS}-${ARCH}"

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $os = "${{ runner.os }}".ToLower()
          $arch = "${{ runner.arch }}".ToLower()
          bun build --compile source/cli.tsx --outfile "dist/minenet-cli-$os-$arch.exe"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ runner.os }}-${{ runner.arch }}
          path: dist/minenet-cli-*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: release-assets/*
