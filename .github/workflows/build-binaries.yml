name: Build Binaries

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm ci || npm install --no-audit --no-fund

      - name: Build binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          OS="$(echo '${{ runner.os }}' | tr '[:upper:]' '[:lower:]')"
          ARCH="$(echo '${{ runner.arch }}' | tr '[:upper:]' '[:lower:]')"
          bun build --compile source/cli.tsx --outfile "dist/minenet-cli-${OS}-${ARCH}"
          if find dist -maxdepth 1 -type f -name '*[A-Z]*' | grep -q .; then
            echo "Uppercase letters detected in binary filename(s)." >&2
            find dist -maxdepth 1 -type f -name '*[A-Z]*'
            exit 1
          fi

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $os = "${{ runner.os }}".ToLower()
          $arch = "${{ runner.arch }}".ToLower()
          bun build --compile source/cli.tsx --outfile "dist/minenet-cli-$os-$arch.exe"
          $upper = Get-ChildItem dist -File | Where-Object { $_.Name -cmatch '[A-Z]' }
          if ($upper) {
            Write-Error "Uppercase letters detected in binary filename(s)."
            $upper | ForEach-Object { $_.Name }
            exit 1
          }

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ runner.os }}-${{ runner.arch }}
          path: dist/minenet-cli-*
          if-no-files-found: error
